name: Daily MOEX Stock Analysis

on:
  schedule:
    # Пн–Пт в 07:00 UTC = 10:00 МСК (открытие торгов)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:   # Ручной запуск для тестирования

# Нужно для публикации дашборда на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать параллельные деплои Pages
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Защита от зависания

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # История прогонов (SQLite) переживает запуски → копятся тренды и бэктест.
      # restore-keys подхватывает последний кэш, key с run_id пишет новый.
      - name: Restore run history
        uses: actions/cache@v4
        with:
          path: data/history.db
          key: moex-history-${{ github.run_id }}
          restore-keys: |
            moex-history-

      - name: Run analysis
        env:
          SENTIMENT_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Боевой канал шлёт только CI — локальные прогоны без флага молчат
          TELEGRAM_ENABLED: "1"
        run: python main.py

      # Страховка кэша: Actions Cache вытесняется (лимит 10GB, TTL 7 дней) —
      # артефакт с retention 90 дней позволяет восстановить историю вручную.
      # Стоит ДО delta_check: падение отправки дельты не должно отменять бэкап.
      - name: Backup run history (artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: history-db-backup
          path: data/history.db
          retention-days: 90

      - name: Send delta report (signal changes vs previous run)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ENABLED: "1"
        run: python delta_check.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-logs
          path: logs/
          retention-days: 7

      - name: Upload reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: reports/
          retention-days: 30

      - name: Upload dashboard for Pages
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: analyze
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
