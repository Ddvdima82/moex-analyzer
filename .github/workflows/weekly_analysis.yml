name: Weekly MOEX Stock Analysis

on:
  schedule:
    # Каждый понедельник в 06:00 UTC = 09:00 МСК
    - cron: '0 6 * * 1'
  workflow_dispatch:   # Ручной запуск для тестирования

# Нужно для публикации дашборда на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать параллельные деплои Pages
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Защита от зависания

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # История прогонов (SQLite) переживает запуски → копятся тренды и бэктест.
      # restore-keys подхватывает последний кэш, key с run_id пишет новый.
      - name: Restore run history
        uses: actions/cache@v4
        with:
          path: data/history.db
          key: moex-history-${{ github.run_id }}
          restore-keys: |
            moex-history-

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-logs
          path: logs/
          retention-days: 7

      - name: Upload reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: reports/
          retention-days: 30

      - name: Upload dashboard for Pages
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: analyze
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
